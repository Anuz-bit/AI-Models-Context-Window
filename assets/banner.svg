<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fffdf8"/>
    <stop offset="100%" stop-color="#fff3e6"/>
  </linearGradient>
  <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff8a00">
      <animate attributeName="stop-color" values="#ff8a00;#ffb347;#ff8a00" dur="8s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#ff5f6d">
      <animate attributeName="stop-color" values="#ff5f6d;#ff8a00;#ff5f6d" dur="8s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".15"/>
  </filter>
</defs>

<rect width="1200" height="360" rx="28" fill="url(#bg)"/>

<!-- soft blobs -->
<circle cx="110" cy="70" r="80" fill="#ffe6bf" opacity=".45"/>
<circle cx="1110" cy="310" r="95" fill="#ffe0c7" opacity=".45"/>

<!-- particles -->
<g fill="#ff9d3c" opacity=".6">
<circle cx="150" cy="120" r="3"><animate attributeName="cy" values="120;105;120" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="1030" cy="85" r="2.8"><animate attributeName="cy" values="85;100;85" dur="5s" repeatCount="indefinite"/></circle>
<circle cx="980" cy="280" r="2.4"><animate attributeName="cy" values="280;265;280" dur="6s" repeatCount="indefinite"/></circle>
</g>

<!-- brain -->
<text x="600" y="72" text-anchor="middle" font-size="34">🧠</text>

<text x="600" y="118" text-anchor="middle"
 font-family="Inter,Segoe UI,Arial" font-size="42" font-weight="700" fill="#2f2f2f">
 AI Models
</text>

<text x="600" y="156" text-anchor="middle"
 font-family="Inter,Segoe UI,Arial" font-size="34" font-weight="700" fill="url(#grad)">
 Context Window
</text>

<text x="600" y="184" text-anchor="middle"
 font-family="Inter,Segoe UI,Arial" font-size="18" fill="#777">
Visual Cheat Sheet for Modern LLMs
</text>

<!-- timeline -->
<line x1="180" y1="245" x2="1020" y2="245" stroke="#f2c78b" stroke-width="6" stroke-linecap="round"/>
<circle r="8" fill="#ff8a00" filter="url(#shadow)">
 <animateMotion dur="6s" repeatCount="indefinite" path="M180,245 L1020,245"/>
</circle>

<!-- milestones -->
<g font-family="Inter,Segoe UI,Arial" text-anchor="middle">

<circle cx="220" cy="245" r="12" fill="#fff" stroke="#ff9d3c" stroke-width="3" filter="url(#shadow)">
<animate attributeName="r" values="12;14;12" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="220" y="282" font-size="18" font-weight="700" fill="#333">128K</text>
<text x="220" y="304" font-size="14" fill="#777">GPT-4o</text>

<circle cx="410" cy="245" r="12" fill="#fff" stroke="#ff9d3c" stroke-width="3" filter="url(#shadow)">
<animate attributeName="r" values="12;14;12" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="410" y="282" font-size="18" font-weight="700" fill="#333">200K</text>
<text x="410" y="304" font-size="14" fill="#777">Claude</text>

<circle cx="600" cy="245" r="12" fill="#fff" stroke="#ff9d3c" stroke-width="3" filter="url(#shadow)">
<animate attributeName="r" values="12;14;12" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="600" y="282" font-size="18" font-weight="700" fill="#333">400K</text>
<text x="600" y="304" font-size="14" fill="#777">GPT-5</text>

<circle cx="810" cy="245" r="12" fill="#fff" stroke="#ff9d3c" stroke-width="3" filter="url(#shadow)">
<animate attributeName="r" values="12;14;12" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="810" y="282" font-size="18" font-weight="700" fill="#333">1–2M</text>
<text x="810" y="304" font-size="14" fill="#777">Gemini</text>

<circle cx="1000" cy="245" r="12" fill="#fff" stroke="#ff9d3c" stroke-width="3" filter="url(#shadow)">
<animate attributeName="r" values="12;14;12" dur="2.5s" repeatCount="indefinite"/>
</circle>
<text x="1000" y="282" font-size="18" font-weight="700" fill="#333">10M</text>
<text x="1000" y="304" font-size="14" fill="#777">Llama 4</text>

</g>

<text x="600" y="338" text-anchor="middle"
font-family="Inter,Segoe UI,Arial" font-size="16" fill="#8a6a47">
Understand • Compare • Choose
</text>

</svg>
